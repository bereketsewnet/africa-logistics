limit_req_zone $binary_remote_addr zone=api_rl:10m rate=60r/m;

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 5m;
    limit_req_status 429;

    # Reverse-proxy API traffic to backend with request throttling.
    location ~ ^/(auth|api|admin|plans|payments|health) {
        limit_req zone=api_rl burst=30 nodelay;

        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # React Router — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
