services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bemnet
      POSTGRES_PASSWORD: bemnet
      POSTGRES_DB: bemnet
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bemnet"]
      interval: 5s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://bemnet:bemnet@db:5432/bemnet
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    volumes:
      - receipts:/app/uploads/receipts
    depends_on:
      db:
        condition: service_healthy
      chroma:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pg_data:
  chroma_data:
  receipts:
